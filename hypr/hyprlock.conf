# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = JetBrainsMono Nerd Font Mono

general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

# Dark overlay for better text visibility
background {
    monitor =
    color = rgba(0, 0, 0, 0.4)
}

# FRAME вҖ” must remain first
label {
    monitor =
    text = cmd[update:0] printf 'в”Ңв”Җ[ locked ]в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ'
    font_size = 13
    font_family = JetBrainsMono Nerd Font Mono
    color = rgba(3b4261ff)
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    inner_color = rgba(1f2335ff)

    outer_color = rgba(3b4261ff)
    check_color = rgba(7aa2f7ff)
    fail_color = rgba(f7768eff)
    capslock_color = rgba(7aa2f7ff)

    font_color = rgba(c0caf5ff)
    fade_on_empty = false
    fade_timeout = 1000
    rounding = 0

    font_family = $font
    placeholder_text = <i>Password</i>

    dots_center = true
    dots_rounding = -1 # -1 = default (circle)
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -40
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 32
    font_family = $font
    color = rgba(c0caf5ff)

    position = 0, 72
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 13
    font_family = $font
    color = rgba(565f89ff)

    position = 0, 32
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[en,fr]
    font_size = 13
    font_family = $font
    color = rgba(565f89ff)
    onclick = hyprctl switchxkblayout all next

    position = 0, -80
    halign = center
    valign = center
}
